<div class="page-content">

  <div class="header-row">
    <div class="title-area">
      <span class="subtitle">LISTAGEM</span>
      <h1>Controle de Produtos</h1>
    </div>

    <div class="add-button-wrapper">
      <button
        mat-fab
        class="add-button"
        type="button"
        routerLink="/produtos/new">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>

  <div class="search-wrapper">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Pesquisar</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Pesquisar produto">
    </mat-form-field>
  </div>

  <div class="table-card">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0">

      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Número</th>
        <td mat-cell *matCellDef="let obj; let i = index">
          {{ i + 1 }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let obj">
          {{ obj.nome }}
        </td>
      </ng-container>

      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef>Preço</th>
        <td mat-cell *matCellDef="let obj">
          {{ obj.preco | currency:'BRL' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="estoque">
        <th mat-header-cell *matHeaderCellDef>Estoque</th>
        <td mat-cell *matCellDef="let obj">
          {{ obj.estoque }}
        </td>
      </ng-container>

      <ng-container matColumnDef="marca">
        <th mat-header-cell *matHeaderCellDef>Marca</th>
        <td mat-cell *matCellDef="let obj">
          {{ obj.marca?.nome }}
        </td>
      </ng-container>

      <ng-container matColumnDef="modelo">
        <th mat-header-cell *matHeaderCellDef>Modelo</th>
        <td mat-cell *matCellDef="let obj">
          {{ obj.modelo?.nome }}
        </td>
      </ng-container>

<ng-container matColumnDef="acao">
  <th mat-header-cell *matHeaderCellDef>Ações</th>
  <td mat-cell *matCellDef="let obj">
    <div class="action-buttons">
      <button
        mat-icon-button
        type="button"
        color="primary"
        (click)="editar(obj.id)">
        <mat-icon>edit</mat-icon>
      </button>

      <button
        mat-icon-button
        type="button"
        color="warn"
        (click)="excluir(obj.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </td>
</ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="empty-row" colspan="7">
          Nenhum produto encontrado.
        </td>
      </tr>

    </table>

    <div class="paginator-container">
  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    [pageSize]="5"
    showFirstLastButtons>
  </mat-paginator>
</div>
  </div>

</div>
