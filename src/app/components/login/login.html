<div class="login-page">

  <section class="brand-side">
    <div class="brand-content">
      <h1>E-Garrafas</h1>

      <div class="product-card">
        <div class="bottle-icon">
          <mat-icon>local_drink</mat-icon>
        </div>

        <h2>Bem-vindo!</h2>
        <p>Entre para acessar o catálogo, carrinho, desejos e suas compras.</p>
      </div>
    </div>
  </section>

  <section class="form-side">
    <mat-card class="login-card">

      <div class="title-area">
        <span class="subtitle">ACESSO</span>
        <h1>Entrar</h1>
        <p>Informe seus dados para continuar.</p>
      </div>

      <form class="form" [formGroup]="form">

        <mat-form-field appearance="outline">
          <mat-label>Usuário</mat-label>
          <input
            matInput
            formControlName="username"
            placeholder="Nome de usuário">

          <mat-error *ngIf="form.get('username')?.hasError('required') && form.get('username')?.touched">
            O nome de usuário é obrigatório.
          </mat-error>

          <mat-error *ngIf="form.get('username')?.hasError('username') && form.get('username')?.touched">
            Informe um nome de usuário válido.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input
            matInput
            [type]="ocultarSenha ? 'password' : 'text'"
            formControlName="senha"
            placeholder="Digite sua senha">

          <button
            mat-icon-button
            matSuffix
            type="button"
            class="eye-button"
            (click)="ocultarSenha = !ocultarSenha">
            <mat-icon>{{ ocultarSenha ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>

          <mat-error *ngIf="form.get('senha')?.hasError('required') && form.get('senha')?.touched">
            A senha é obrigatória.
          </mat-error>
        </mat-form-field>

        <button
          mat-raised-button
          type="button"
          class="login-button"
          (click)="entrar()">
          Entrar
        </button>

        <div class="links">
          <a routerLink="/recuperar-senha">Esqueci minha senha</a>
          <a routerLink="/login">Criar conta</a>
        </div>

      </form>
    </mat-card>
  </section>

</div>
